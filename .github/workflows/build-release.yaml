---
name: Build Release

"on":
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version (without leading "v")
        required: true
      release_notes:
        description: Release notes in markdown format
        required: true

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Set release notes
        run: |
          RELEASE_NOTES_FILE=$(mktemp)
          echo "${{ github.event.inputs.release_notes }}" >> "${RELEASE_NOTES_FILE}"
          echo "GORELEASER_RELEASE_NOTES=${RELEASE_NOTES_FILE}" >> "${GITHUB_ENV}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # renovate: datasource=github-releases depName=goreleaser/goreleaser versioning=semver
          version: "v2.16.0"
          args: release --clean --release-notes="${{ env.GORELEASER_RELEASE_NOTES }}"
